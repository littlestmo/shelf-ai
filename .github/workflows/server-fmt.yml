name: 🦀 Server Format

on:
  push:
    branches: ["main", "master"]
    paths:
      - "apps/server/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "apps/server/**"

jobs:
  fmt:
    name: 🦀 Format Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦀 Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 🔍 Check Formatting
        working-directory: apps/server
        run: cargo fmt --check
